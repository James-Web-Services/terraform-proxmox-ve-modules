name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**/*.tf"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-tags: true

      - name: Compute CalVer tag
        id: calver
        run: |
          DATE=$(date -u +"%Y.%m.%d")
          BASE="v${DATE}"

          # Get the latest tag that matches the base version (e.g. v2026.06.23-0)
          LATEST=$(git tag --list "${BASE}-*" | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            PREV_TAG=$(git tag --list "*.*.*-*" | sort -V | tail -1)
            NEW_TAG="${BASE}-0"
          else
            N="${LATEST##*-}"
            PREV_TAG="${LATEST}"
            NEW_TAG="${BASE}-$((N + 1))"
          fi

          echo "Previous tag: $PREV_TAG"
          echo "New tag: $NEW_TAG"

          echo "prev_tag=${PREV_TAG}" >> $GITHUB_OUTPUT
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.calver.outputs.new_tag }}
          previous_tag: ${{ steps.calver.outputs.prev_tag }}
          generate_release_notes: true
